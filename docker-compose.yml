services:
  postgres:
    image: postgres:16
    container_name: audit-trail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: audit_trail_db
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_user -d audit_trail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
